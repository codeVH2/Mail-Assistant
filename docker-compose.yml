services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mail_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mail_assistant}
      POSTGRES_DB: ${POSTGRES_DB:-mail_assistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mail_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
